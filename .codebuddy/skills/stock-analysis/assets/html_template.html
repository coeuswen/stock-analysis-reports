<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票复盘分析报告 - [DATE]</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            font-size: 32px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }
        
        h2 {
            color: #2c3e50;
            font-size: 28px;
            margin: 40px 0 20px 0;
            padding-left: 15px;
            border-left: 5px solid #667eea;
        }
        
        h3 {
            color: #34495e;
            font-size: 24px;
            margin: 30px 0 15px 0;
        }
        
        .toc {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 15px;
            margin: 30px 0;
            color: white;
        }
        
        .toc h2 {
            color: white;
            border-left: none;
            padding-left: 0;
            margin-top: 0;
        }
        
        .toc ul {
            list-style: none;
            margin-top: 20px;
        }
        
        .toc li {
            padding: 12px 20px;
            margin: 8px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .toc li:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(10px);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
            padding: 15px;
            text-align: left;
            font-size: 16px;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        tr:nth-child(even) {
            background: #f8f9fa;
        }
        
        tr:hover {
            background: #e8f4f8;
            transform: scale(1.01);
            transition: all 0.3s ease;
        }
        
        .stock-code {
            font-family: 'Courier New', monospace;
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin: 2px;
        }
        
        .badge-red {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }
        
        .badge-green {
            background: #efe;
            color: #080;
            border: 1px solid #cfc;
        }
        
        .badge-blue {
            background: #eef;
            color: #00f;
            border: 1px solid #ccf;
        }
        
        .badge-yellow {
            background: #ffe;
            color: #c80;
            border: 1px solid #ffc;
        }
        
        .analysis-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            border-left: 5px solid #667eea;
        }
        
        .event-icon {
            font-size: 20px;
            margin-right: 10px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            margin: 25px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .container {
                box-shadow: none;
                padding: 30px;
            }
            
            .toc li:hover {
                transform: none;
            }
            
            tr:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- CONTENT WILL BE INSERTED HERE -->
    </div>
</body>
</html>
