name: Auto Update Docs
on:
  push:
    branches: [ main ]
    paths: [ "*.html" ]
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Python Script
        shell: python
        run: |
          import os, shutil, urllib.parse
          # 1. 搜集并复制文件
          files = [f for f in os.listdir('.') if f.endswith('.html') and f != 'index.html']
          files.sort(reverse=True)
          if not os.path.exists("docs"): os.makedirs("docs")
          
          li_tags = ""
          for f in files:
              shutil.copy2(f, os.path.join("docs", f))
              safe_link = urllib.parse.quote(f)
              li_tags += f'        <li><a href=" " target="_blank">📈 {f}</a ></li>\n'
          
          # 2. 构造 HTML
          with open("docs/index.html", "w", encoding="utf-8") as f:
              f.write(f"""<!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>股票复盘分析报告</title>
              <style>
                  body {{ font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; background-color: #f6f8fa; }}
                  h1 {{ color: #24292e; border-bottom: 2px solid #0366d6; padding-bottom: 10px; }}
                  ul {{ list-style: none; padding: 0; }}
                  li {{ background: white; margin-bottom: 12px; border: 1px solid #e1e4e8; border-radius: 8px; }}
                  a {{ text-decoration: none; color: #0366d6; font-weight: bold; padding: 18px; display: block; }}
                  footer {{ margin-top: 50px; color: #888; font-size: 12px; text-align: center; }}
              </style>
          </head>
          <body>
              <h1>📊 股票复盘分析报告列表</h1>
              <ul>
          {li_tags}
              </ul>
              <footer>最后更新: {os.popen('date "+%Y-%m-%d %H:%M:%S"').read()}</footer>
          </body>
          </html>""")

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git commit -m "Fix syntax and links" || echo "No changes"
          git push
