name: Auto Update Docs
on:
  push:
    branches: [ main ]
    paths: [ "*.html" ]
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Python Overwrite Logic
        shell: python
        run: |
          import os
          import glob
          import shutil

          # 1. 搜集根目录下的 HTML (排除 index.html)
          files = [f for f in glob.glob("*.html") if f != "index.html"]
          files.sort(reverse=True) # 按文件名降序，最新的报告在最上面

          # 2. 确保 docs 目录存在并同步文件
          if not os.path.exists("docs"):
              os.makedirs("docs")
          
          list_items_html = ""
          for f in files:
              shutil.copy2(f, os.path.join("docs", f))
              list_items_html += f'        <li><a href=" " target="_blank">预览 {f}</a ></li>\n'

          # 3. 直接生成全新的 index.html 内容（不再读取旧文件，彻底防重复）
          full_html = f"""<!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>股票复盘分析报告</title>
              <style>
                  body {{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; background-color: #f6f8fa; }}
                  h1 {{ color: #24292e; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }}
                  ul {{ list-style: none; padding: 0; }}
                  li {{ background: white; margin-bottom: 10px; padding: 15px; border: 1px solid #e1e4e8; border-radius: 6px; box-shadow: 0 1px 3px rgba(27,31,35,0.04); transition: transform 0.2s; }}
                  li:hover {{ transform: translateY(-2px); box-shadow: 0 4px 12px rgba(27,31,35,0.15); }}
                  a {{ text-decoration: none; color: #0366d6; font-weight: 600; font-size: 16px; }}
                  a:hover {{ text-decoration: underline; }}
              </style>
          </head>
          <body>
              <h1>📈 股票复盘分析报告列表</h1>
              <ul>
          {list_items_html}
              </ul>
              <footer style="margin-top: 50px; color: #6a737d; font-size: 12px; text-align: center;">
                  自动更新于: {os.popen('date').read()}
              </footer>
          </body>
          </html>"""

          # 4. 强力覆盖写入
          with open("docs/index.html", "w", encoding="utf-8") as f:
              f.write(full_html)
          print("✅ index.html 已重建，彻底清除重复内容。")

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git commit -m "Reconstruct index.html to fix duplicates" || echo "No changes to commit"
          git push
