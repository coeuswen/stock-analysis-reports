name: Auto Update Docs
on:
  push:
    branches: [ main ]
    paths: [ "*.html" ]
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Python Overwrite Logic
        shell: python
        run: |
          import os
          import glob
          import shutil

          # 1. 搜集根目录下的 HTML (排除 index.html)
          # 注意：这里只处理根目录下的 html
          files = [f for f in os.listdir('.') if f.endswith('.html') and f != 'index.html']
          files.sort(reverse=True) 

          # 2. 确保 docs 目录存在，并将文件拷贝进去
          if not os.path.exists("docs"):
              os.makedirs("docs")
          
          list_items_html = ""
          for f in files:
              # 将根目录的文件拷贝到 docs 文件夹
              shutil.copy2(f, os.path.join("docs", f))
              # 关键点：链接直接写文件名即可，因为它们和 index.html 在同一个 docs 文件夹下
              list_items_html += f'        <li><a href=" " target="_blank">查看详情：{f}</a ></li>\n'

          # 3. 生成 index.html
          full_html = f"""<!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>股票复盘分析报告</title>
              <style>
                  body {{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; background-color: #f6f8fa; }}
                  h1 {{ color: #24292e; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; display: flex; align-items: center; }}
                  ul {{ list-style: none; padding: 0; }}
                  li {{ background: white; margin-bottom: 10px; padding: 15px; border: 1px solid #e1e4e8; border-radius: 6px; box-shadow: 0 1px 3px rgba(27,31,35,0.04); transition: all 0.2s; }}
                  li:hover {{ transform: translateY(-2px); box-shadow: 0 4px 12px rgba(27,31,35,0.15); border-color: #0366d6; }}
                  a {{ text-decoration: none; color: #0366d6; font-weight: 600; font-size: 16px; display: block; width: 100%; }}
                  footer {{ margin-top: 50px; color: #6a737d; font-size: 12px; text-align: center; border-top: 1px solid #eaecef; padding-top: 20px; }}
              </style>
          </head>
          <body>
              <h1>📊 股票复盘分析报告列表</h1>
              <ul>
          {list_items_html}
              </ul>
              <footer>
                  数据自动同步中<br>
                  最后更新时间: {os.popen('date "+%Y-%m-%d %H:%M:%S"').read()}
              </footer>
          </body>
          </html>"""

          with open("docs/index.html", "w", encoding="utf-8") as f:
              f.write(full_html)

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git commit -m "Fix file links and update layout" || echo "No changes to commit"
          git push
