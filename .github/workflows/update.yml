name: Auto Update Docs
on:
  push:
    branches: [ main ]
    paths: [ "*.html" ]
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Index
        shell: python
        run: |
          import os, shutil
          # 1. 创建目录
          if not os.path.exists("docs"): os.makedirs("docs")
          
          # 2. 获取并排序 HTML 文件
          files = [f for f in os.listdir('.') if f.endswith('.html') and f != 'index.html']
          files.sort(reverse=True)
          
          li_tags = ""
          for f in files:
              # 复制文件
              shutil.copy2(f, os.path.join("docs", f))
              # 关键修正：直接使用相对路径，不用任何编码，防止手机浏览器错误解析
              li_tags += f'        <li><a href=" " target="_blank">📊 {f}</a ></li>\n'
          
          # 3. 生成带“强制不翻译”标签的 HTML
          html_content = f"""<!DOCTYPE html>
          <html lang="zh-CN" translate="no">
          <head>
              <meta charset="UTF-8">
              <meta name="google" content="notranslate">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <title>股票复盘报告</title>
              <style>
                  body {{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; max-width: 800px; margin: auto; background: #f4f7f9; }}
                  h1 {{ color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; font-size: 22px; }}
                  ul {{ list-style: none; padding: 0; }}
                  li {{ background: #fff; margin: 12px 0; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }}
                  /* word-break 确保长长的中文文件名在手机上不会超出白框 */
                  a {{ display: block; padding: 18px; text-decoration: none; color: #007bff; font-weight: 600; word-break: break-all; }}
                  a:hover {{ background: #f0faff; border-radius: 8px; }}
                  .footer {{ margin-top: 40px; text-align: center; color: #aaa; font-size: 12px; border-top: 1px solid #eaeaea; padding-top: 15px; }}
              </style>
          </head>
          <body>
              <h1>📈 股票复盘分析报告列表</h1>
              <ul>
          {li_tags}
              </ul>
              <div class="footer">
                  自动同步时间: {os.popen('date "+%Y-%m-%d %H:%M:%S"').read()}
              </div>
          </body>
          </html>"""
          
          with open("docs/index.html", "w", encoding="utf-8") as f:
              f.write(html_content)

      - name: Push Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Fix mobile browser parsing error" && git push)
