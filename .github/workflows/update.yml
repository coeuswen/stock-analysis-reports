name: Auto Update Docs
on:
  push:
    branches: [ main ]
    paths: [ "*.html" ]
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Python Overwrite Logic
        shell: python
        run: |
          import os
          import shutil
          import urllib.parse

          # 1. 搜集根目录下的真实 HTML 文件
          files = [f for f in os.listdir('.') if f.endswith('.html') and f != 'index.html']
          files.sort(reverse=True) 

          if not os.path.exists("docs"):
              os.makedirs("docs")
          
          list_items_html = ""
          for f in files:
              # 物理复制文件到 docs 目录
              shutil.copy2(f, os.path.join("docs", f))
              
              # 关键修正：跳转地址必须是纯文件名，不能包含“预览”字样
              # 为了防止中文空格失效，这里可以选做 url 编码，但浏览器通常能自动识别
              file_link = f
              
              # 构造 HTML：显示的是文件名，链接也是纯文件名
              list_items_html += f'        <li><a href=" " target="_blank">📈 {f}</a ></li>\n'

          # 2. 生成 index.html
          full_html = f"""<!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>股票复盘分析报告</title>
              <style>
                  body {{ font-family: "Microsoft YaHei", -apple-system, sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; background-color: #f6f8fa; }}
                  h1 {{ color: #24292e; border-bottom: 2px solid #0366d6; padding-bottom: 10px; }}
                  ul {{ list-style: none; padding: 0; }}
                  li {{ background: white; margin-bottom: 12px; border: 1px solid #e1e4e8; border-radius: 8px; transition: all 0.2s ease; }}
                  li:hover {{ transform: scale(1.01); box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-color: #0366d6; }}
                  a {{ text-decoration: none; color: #0366d6; font-weight: 600; padding: 18px; display: block; }}
                  footer {{ margin-top: 50px; color: #888; font-size: 13px; text-align: center; }}
              </style>
          </head>
          <body>
              <h1>📊 股票复盘分析报告列表</h1>
              <ul>
          {list_items_html}
              </ul>
              <footer>
                  系统自动实时同步<br>
                  最近更新: {os.popen('date "+%Y-%m-%d %H:%M:%S"').read()}
              </footer>
          </body>
          </html>"""

          with open("docs/index.html", "w", encoding="utf-8") as f:
              f.write(full_html)

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git commit -m "Fix: Remove '预览' prefix from href and clean up links" || echo "No changes"
          git push
