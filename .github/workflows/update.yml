name: Auto Update Docs
on:
  push:
    branches: [ main ]
    paths: [ "*.html" ]
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Python Update Logic
        shell: python
        run: |
          import os
          import glob
          import shutil

          # 1. 搜集根目录下的 HTML (排除 index.html)
          files = [f for f in glob.glob("*.html") if f != "index.html"]
          files.sort(reverse=True) # 新的在前

          # 2. 同步文件并生成列表代码
          list_html = "<ul>\n"
          for f in files:
              shutil.copy2(f, os.path.join("docs", f))
              list_html += f'  <li><a href=" " target="_blank">预览 {f}</a ></li>\n'
          list_html += "</ul>"

          # 3. 稳健地更新 index.html
          index_path = "docs/index.html"
          START_MARK = ""
          END_MARK = ""

          if os.path.exists(index_path):
              with open(index_path, "r", encoding="utf-8") as f:
                  lines = f.readlines()
              
              new_lines = []
              skip = False
              found_markers = False

              for line in lines:
                  if START_MARK in line:
                      new_lines.append(line)      # 保留开始标记
                      new_lines.append(list_html + "\n") # 插入新列表
                      skip = True                 # 开始跳过旧内容
                      found_markers = True
                      continue
                  if END_MARK in line:
                      skip = False                # 停止跳过
                      new_lines.append(line)      # 保留结束标记
                      continue
                  if not skip:
                      new_lines.append(line)      # 保留原始内容

              if found_markers:
                  with open(index_path, "w", encoding="utf-8") as f:
                      f.writelines(new_lines)
                  print("✅ 更新成功！")
              else:
                  print("❌ 错误：index.html 里没找到标记代码")
          else:
              print("❌ 错误：docs/index.html 文件没找到")

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Fix list duplicates and separator error" && git push)
