name: Auto Update Docs
on:
  push:
    branches: [ main ]
    paths: [ "*.html" ]
  workflow_dispatch: 

permissions:
  contents: write  # 必须显式开启写入权限

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Index
        shell: python
        run: |
          import os, shutil, urllib.parse
          # 1. 确保目录存在
          if not os.path.exists("docs"): os.makedirs("docs")
          
          # 2. 搜集根目录下的 HTML
          files = [f for f in os.listdir('.') if f.endswith('.html') and f != 'index.html']
          files.sort(reverse=True)
          
          li_tags = ""
          for f in files:
              shutil.copy2(f, os.path.join("docs", f))
              safe_link = urllib.parse.quote(f)
              li_tags += f'        <li><a href=" " target="_blank">📊 {f}</a ></li>\n'
          
          # 3. 写入 HTML (使用最简单的样式)
          html_content = f"""<!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>股票复盘报告</title>
              <style>
                  body {{ font-family: sans-serif; padding: 30px; max-width: 800px; margin: auto; background: #f4f7f9; }}
                  h1 {{ color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }}
                  ul {{ list-style: none; padding: 0; }}
                  li {{ background: #fff; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }}
                  a {{ display: block; padding: 20px; text-decoration: none; color: #007bff; font-weight: bold; }}
                  a:hover {{ background: #f0faff; }}
              </style>
          </head>
          <body>
              <h1>📈 股票复盘分析报告列表</h1>
              <ul>
          {li_tags}
              </ul>
              <hr>
              <p style="text-align:center; color: #999;">更新时间: {os.popen('date "+%Y-%m-%d %H:%M:%S"').read()}</p >
          </body>
          </html>"""
          
          with open("docs/index.html", "w", encoding="utf-8") as f:
              f.write(html_content)

      - name: Push Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          # 只有当有文件变化时才提交，防止报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update list" && git push)
