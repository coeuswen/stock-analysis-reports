name: Auto Update Docs
on:
  push:
    branches: [ main ]
    paths: [ "*.html" ]
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Python Update Logic
        shell: python
        run: |
          import os
          import glob
          import shutil

          # 1. 获取根目录下所有 html 文件 (排除 index.html)
          # 使用 glob 处理特殊字符更稳健
          source_files = [f for f in glob.glob("*.html") if f != "index.html"]
          source_files.sort(reverse=True) # 按名称降序，这样日期新的在上面

          # 2. 同步到 docs 目录并生成链接列表
          list_items = []
          for f in source_files:
              shutil.copy2(f, os.path.join("docs", f))
              list_items.append(f'<li><a href=" " target="_blank">预览 {f}</a ></li>')
          
          list_html = "<ul>\n" + "\n".join(list_items) + "\n</ul>"

          # 3. 替换 docs/index.html 中的内容
          index_path = "docs/index.html"
          start_marker = ""
          end_marker = ""

          if os.path.exists(index_path):
              with open(index_path, "r", encoding="utf-8") as f:
                  content = f.read()
              
              if start_marker in content and end_marker in content:
                  prefix = content.split(start_marker)[0]
                  suffix = content.split(end_marker)[-1]
                  # 重新拼接：前缀 + 开始标记 + 新列表 + 结束标记 + 后缀
                  new_content = f"{prefix}{start_marker}\n{list_html}\n{end_marker}{suffix}"
                  
                  with open(index_path, "w", encoding="utf-8") as f:
                      f.write(new_content)
                  print("Index.html 更新成功！")
              else:
                  print("错误：在 index.html 中没找到标记位！")
          else:
              print("错误：docs/index.html 不存在！")

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Fix duplicate links and sync files" && git push)
