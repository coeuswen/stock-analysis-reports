name: 自动生成报告索引并部署

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 生成报告索引页面
        run: |
          echo "=== 开始生成报告索引 ==="
          
          # 确保 docs 目录存在
          mkdir -p docs
          
          # 扫描报告文件
          REPORT_COUNT=$(find . -maxdepth 1 -name "股票复盘分析报告_*.html" -type f | wc -l)
          echo "找到 $REPORT_COUNT 个报告文件"
          
          # 生成完整的 index.html 文件
          cat > docs/index.html << 'EOF'
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票分析报告索引</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .update-time {
            background: rgba(255, 255, 255, 0.1);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
        }
        .report-list {
            padding: 30px;
        }
        .report-item {
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .report-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }
        .report-link {
            font-size: 1.2rem;
            color: #333;
            font-weight: 600;
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
        }
        .report-link:hover {
            color: #667eea;
        }
        .report-meta {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #6c757d;
            border-top: 1px solid #e9ecef;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-chart-line"></i> 股票分析报告索引</h1>
            <p class="update-time">最后更新: $(date '+%Y年%m月%d日 %H:%M:%S')</p>
        </header>
        
        <div class="report-list">
EOF

          # 动态插入报告列表
          if [ $REPORT_COUNT -eq 0 ]; then
            cat >> docs/index.html << 'EOF'
            <div class="empty-state">
                <i class="fas fa-inbox" style="font-size:4rem; margin-bottom:20px; color:#dee2e6;"></i>
                <h3>暂无分析报告</h3>
                <p>请将报告文件（股票复盘分析报告_*.html）放置在仓库根目录</p>
            </div>
EOF
          else
            find . -maxdepth 1 -name "股票复盘分析报告_*.html" -typef | sort -r | while read filepath; do
              filename=$(basename "$filepath")
              cat >> docs/index.html << EOF
            <div class="report-item">
                <a href="../$filename" class="report-link">
                    <i class="fas fa-file-alt"></i> $filename
                </a>
                <div class="report-meta">
                    <span><i class="fas fa-calendar-alt"></i> 报告文件</span>
                </div>
            </div>
EOF
            done
          fi
          
          # 添加页脚
          cat >> docs/index.html << 'EOF'
        </div>
        
        <footer>
            <p>本页面由 GitHub Actions 自动生成 | 共收录 $REPORT_COUNT 个报告</p>
            <p style="margin-top:10px; font-size:0.9rem;">
                <i class="fas fa-robot"></i> 全自动化生成 | 更新于 $(date)
            </p>
        </footer>
    </div>
    
    <script>
        // 更新报告数量显示
        document.addEventListener('DOMContentLoaded', function() {
            const count = document.querySelectorAll('.report-item').length;
            const footerText = document.querySelector('footer p');
            if (footerText && count > 0) {
                footerText.innerHTML = footerText.innerHTML.replace('\\$REPORT_COUNT', count);
            }
        });
    </script>
</body>
</html>
EOF

          # 替换占位符变量
          sed -i "s/\\\$REPORT_COUNT/$REPORT_COUNT/g" docs/index.html
          sed -i "s/\$(date)/$(date '+%Y-%m-%d %H:%M:%S')/g" docs/index.html
          sed -i "s/\$(date '+%Y年%m月%d日 %H:%M:%S')/$(date '+%Y年%m月%d日 %H:%M:%S')/g" docs/index.html
          
          echo "✅ 索引页面生成完成！"
          echo "📁 文件位置: docs/index.html"
          echo "📄 报告数量: $REPORT_COUNT 个"

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
