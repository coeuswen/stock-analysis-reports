name: 自动生成报告索引并部署

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Index Page
        run: |
          echo "开始生成索引页面..."
          
          # 1. 确保发布目录存在
          mkdir -p docs
          
          # 2. 扫描报告文件
          echo "正在扫描根目录下的报告文件..."
          REPORT_FILES=$(find . -maxdepth 1 -name "股票复盘分析报告_*.html" | sort -r)
          REPORT_COUNT=$(echo "$REPORT_FILES" | wc -l)
          echo "找到 $REPORT_COUNT 个报告文件。"
          
          # 3. 创建 HTML 文件
          echo '<!DOCTYPE html>' > docs/index.html
          echo '<html lang="zh-CN">' >> docs/index.html
          echo '<head>' >> docs/index.html
          echo '    <meta charset="UTF-8">' >> docs/index.html
          echo '    <meta name="viewport" content="width=device-width, initial-scale=1.0">' >> docs/index.html
          echo '    <title>股票分析报告索引</title>' >> docs/index.html
          echo '    <style>' >> docs/index.html
          echo '        body { font-family: sans-serif; margin: 2rem; }' >> docs/index.html
          echo '        h1 { color: #333; }' >> docs/index.html
          echo '        ul { list-style: none; padding: 0; }' >> docs/index.html
          echo '        li { margin: 1rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 5px; }' >> docs/index.html
          echo '        a { color: #0366d6; text-decoration: none; font-weight: bold; }' >> docs/index.html
          echo '        a:hover { text-decoration: underline; }' >> docs/index.html
          echo '        .update-info { color: #666; font-size: 0.9em; margin-top: 2rem; }' >> docs/index.html
          echo '    </style>' >> docs/index.html
          echo '</head>' >> docs/index.html
          echo '<body>' >> docs/index.html
          echo '    <h1>股票分析报告索引</h1>' >> docs/index.html
          echo '    <p>最后更新: '$(date '+%Y-%m-%d %H:%M:%S')'</p>' >> docs/index.html
          echo '    <hr>' >> docs/index.html
          echo '    <ul>' >> docs/index.html
          
          # 4. 动态插入文件列表
          if [ $REPORT_COUNT -eq 0 ]; then
            echo '        <li>暂无报告文件。请将"股票复盘分析报告_*.html"文件放入仓库根目录。</li>' >> docs/index.html
          else
            echo "$REPORT_FILES" | while read -r file; do
              filename=$(basename "$file")
              echo '        <li><a href="../'$filename'">'$filename'</a></li>' >> docs/index.html
            done
          fi
          
          # 5. 写入 HTML 尾部
          echo '    </ul>' >> docs/index.html
          echo '    <div class="update-info">' >> docs/index.html
          echo '        <p>本页面由 GitHub Actions 工作流自动生成。共收录 '$REPORT_COUNT' 个报告。</p>' >> docs/index.html
          echo '    </div>' >> docs/index.html
          echo '</body>' >> docs/index.html
          echo '</html>' >> docs/index.html
          
          echo "✅ 索引页面已生成: docs/index.html"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
