# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      # 新增：自动生成索引页面
      - name: Generate index.html
        run: |
          # 确保 docs 目录存在
          mkdir -p docs
          
          # 创建索引页面的HTML头部
          echo '<!DOCTYPE html>
          <html>
          <head>
              <title>股票分析报告索引</title>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <style>
                  body { 
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
                      line-height: 1.6; 
                      max-width: 800px; 
                      margin: 0 auto; 
                      padding: 20px; 
                      color: #24292e; 
                      background-color: #f6f8fa;
                  }
                  header { 
                      text-align: center; 
                      margin-bottom: 40px; 
                      padding-bottom: 20px; 
                      border-bottom: 1px solid #e1e4e8;
                  }
                  h1 { 
                      color: #0366d6; 
                      margin-bottom: 10px;
                  }
                  .update-time { 
                      color: #6a737d; 
                      font-size: 14px; 
                      margin-bottom: 30px;
                  }
                  .report-list { 
                      background: white; 
                      border: 1px solid #e1e4e8; 
                      border-radius: 6px; 
                      overflow: hidden;
                  }
                  .report-item { 
                      padding: 16px 20px; 
                      border-bottom: 1px solid #eaecef; 
                      transition: background-color 0.2s;
                  }
                  .report-item:last-child { 
                      border-bottom: none; 
                  }
                  .report-item:hover { 
                      background-color: #f6f8fa; 
                  }
                  .report-link { 
                      color: #0366d6; 
                      text-decoration: none; 
                      font-size: 16px; 
                      font-weight: 500;
                      display: block;
                  }
                  .report-link:hover { 
                      text-decoration: underline; 
                      color: #0056b3;
                  }
                  .report-date { 
                      color: #6a737d; 
                      font-size: 13px; 
                      margin-top: 4px;
                  }
                  .empty-state { 
                      text-align: center; 
                      padding: 40px 20px; 
                      color: #6a737d;
                  }
                  footer { 
                      text-align: center; 
                      margin-top: 40px; 
                      padding-top: 20px; 
                      border-top: 1px solid #e1e4e8; 
                      color: #6a737d; 
                      font-size: 13px;
                  }
                  .info-box {
                      background-color: #f0f9ff;
                      border-left: 4px solid #0366d6;
                      padding: 12px 16px;
                      margin: 20px 0;
                      border-radius: 4px;
                  }
              </style>
          </head>
          <body>
              <header>
                  <h1>📈 股票分析报告索引</h1>
                  <p class="update-time">最后更新: ' > docs/index.html
          
          # 添加当前时间
          echo "$(date '+%Y年%m月%d日 %H:%M:%S')" >> docs/index.html
          
          echo '</p>
              </header>
              
              <div class="info-box">
                  <p>📁 <strong>文件位置说明：</strong>报告文件存储在仓库根目录，但通过此页面可以访问。</p>
              </div>' >> docs/index.html
          
          # 在根目录中查找报告文件
          report_count=$(find . -maxdepth 1 -name "股票复盘分析报告_*.html" | wc -l)
          
          if [ $report_count -eq 0 ]; then
              echo '<div class="empty-state">
                  <p>暂无分析报告。</p>
                  <p>请确保您的报告文件（股票复盘分析报告_*.html）已放置在仓库根目录。</p>
              </div>' >> docs/index.html
          else
              echo '<div class="report-list">' >> docs/index.html
              
              # 按文件名排序（最新的在前），在根目录中搜索
              for file in $(ls -t 股票复盘分析报告_*.html 2>/dev/null); do
                  if [ -f "$file" ]; then
                      # 提取文件名中的日期信息
                      filename=$(basename "$file")
                      # 由于文件在根目录，链接需要指向根目录
                      # 但GitHub Pages从/docs部署，所以需要相对路径
                      # 因为index.html在docs目录，报告文件在上级目录，所以用../
                      relative_path="../$filename"
                      
                      # 尝试从文件名中提取日期
                      if [[ $filename =~ ([0-9]{4}-[0-9]{2}-[0-9]{2}) ]]; then
                          file_date="${BASH_REMATCH[1]}"
                      elif [[ $filename =~ ([0-9]{8}) ]]; then
                          date_str="${BASH_REMATCH[1]}"
                          file_date="${date_str:0:4}-${date_str:4:2}-${date_str:6:2}"
                      else
                          # 如果没有找到日期，使用文件修改时间
                          file_date=$(date -r "$file" "+%Y-%m-%d")
                      fi
                      
                      echo "  <div class=\"report-item\">" >> docs/index.html
                      echo "    <a class=\"report-link\" href=\"$relative_path\">$filename</a>" >> docs/index.html
                      echo "    <div class=\"report-date\">📅 报告日期: $file_date</div>" >> docs/index.html
                      echo "  </div>" >> docs/index.html
                  fi
              done
              
              echo '</div>' >> docs/index.html
          fi
          
          echo '<footer>
                  <p>本页面由 GitHub Actions 自动生成 | 报告总数: ' >> docs/index.html
          echo "$report_count" >> docs/index.html
          echo ' 个</p>
              </footer>
          </body>
          </html>' >> docs/index.html
          
          # 输出生成的信息用于调试
          echo "✅ 已生成索引页面，包含 $report_count 个报告文件"
          echo "📁 报告文件位置: 仓库根目录"
          echo "📁 索引文件位置: docs/index.html"
          echo "🔗 生成的链接示例: ../股票复盘分析报告_xxx.html"
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
